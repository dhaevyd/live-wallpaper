name: Build Mac App Intel

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-13
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install VLC
        run: |
          brew install vlc

      - name: Install dependencies
        run: |
          pip install python-vlc pyinstaller

      - name: Build .app
        run: |
          pyinstaller \
            --windowed \
            --name "LiveWallpaper" \
            --target-arch x86_64 \
            src/app.py

      - name: Verify .app exists
        run: |
          ls -la dist/

      - name: Zip .app
        run: |
          cd dist
          zip -r LiveWallpaper.zip LiveWallpaper.app

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: LiveWallpaper
          path: dist/LiveWallpaper.zip
