name: Build Mac App

on:
  push:
    branches: [ main ]

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install VLC
        run: |
          brew install vlc

      - name: Install dependencies
        run: |
          pip install python-vlc pyinstaller

      - name: Build .app
        run: |
          pyinstaller \
            --windowed \
            --name "LiveWallpaper" \
            src/app.py

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: LiveWallpaper
          path: dist/LiveWallpaper.app
